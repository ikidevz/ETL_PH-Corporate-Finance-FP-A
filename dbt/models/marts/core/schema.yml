version: 2

models:
  # ─────────────────────────────────────────────────────────────────────────────
  # DIMENSION TABLES
  # ─────────────────────────────────────────────────────────────────────────────

  - name: dim_date
    description: >
      Date spine enriched with PH fiscal calendar attributes and live period
      lock status. Joins the static ph_fiscal_calendar seed (which defines
      fiscal_year/quarter shape) with the live control.period_lock table
      (which the finance team updates monthly via close_period.py).
      Keeping calendar shape and close status in separate sources is
      intentional — shape never changes; status changes every month-end.
    columns:
      - name: date_key
        description: Calendar date. Primary key and FK target for all fact tables.
        tests:
          - unique
          - not_null
      - name: calendar_year
        description: Gregorian calendar year (e.g. 2024).
        tests:
          - not_null
      - name: calendar_month
        description: Gregorian calendar month integer 1–12.
        tests:
          - not_null
      - name: fiscal_year
        description: PH fiscal year from ph_fiscal_calendar seed.
        tests:
          - not_null
      - name: fiscal_month
        description: PH fiscal month integer 1–12.
        tests:
          - not_null
      - name: fiscal_quarter
        description: PH fiscal quarter (Q1–Q4).
        tests:
          - not_null
          - accepted_values:
              values: ["Q1", "Q2", "Q3", "Q4"]
      - name: period_name
        description: Human-readable period label, e.g. "2024-03".
      - name: period_status
        description: >
          Live close status sourced from control.period_lock.
          OPEN = postings still accepted; CLOSED = period locked.
          Defaults to 'OPEN' via COALESCE if no lock record exists.
        tests:
          - not_null
          - accepted_values:
              values: ["OPEN", "CLOSED"]
      - name: is_period_locked
        description: >
          Boolean flag derived from period_status. TRUE when CLOSED.
          Used in the assert_budget_equals_actuals_period singular test
          to flag late postings to closed periods.
        tests:
          - not_null
      - name: closed_date
        description: Date the period was formally closed. NULL if still OPEN.
      - name: closed_by
        description: >
          Name or role of the person who closed the period via
          close_period.py. NULL if still OPEN.

  - name: dim_account
    description: >
      GL account dimension sourced from the chart_of_accounts seed file.
      Includes IS P&L accounts (4xxx–8xxx) and BS accounts (1xxx–3xxx).
      Filtered to is_active = TRUE so deactivated accounts are excluded
      from all downstream joins without requiring seed row deletion.
      Provides account_type classification, P&L line grouping, financial
      statement assignment (IS/BS), normal_balance (Debit/Credit),
      sort_order for correct IS waterfall sequencing, and a sign_convention
      multiplier used to normalise debit/credit orientation in P&L reporting.
      Revenue = +1, all expense types = -1.
    columns:
      - name: account_key
        description: >
          Surrogate key generated by dbt_utils.generate_surrogate_key
          on gl_account_code. Used as FK in all four fact tables.
        tests:
          - unique
          - not_null
      - name: gl_account_code
        description: Natural GL account code, e.g. "4001". Business key.
        tests:
          - unique
          - not_null
      - name: account_name
        description: Descriptive name of the GL account, e.g. "Revenue - Retail".
        tests:
          - not_null
      - name: account_type
        description: >
          High-level account classification used for P&L structuring
          and sign convention assignment. IS accounts: Revenue, COGS,
          OpEx, Finance Cost, Tax. BS accounts: Asset, Liability, Equity.
        tests:
          - not_null
          - accepted_values:
              values:
                [
                  "Revenue",
                  "COGS",
                  "OpEx",
                  "Finance Cost",
                  "Tax",
                  "Asset",
                  "Liability",
                  "Equity",
                ]
      - name: pnl_line
        description: >
          P&L grouping label used in rpt_pnl_summary CASE WHEN logic.
          Values: Net Revenue, COGS, Personnel Costs, Occupancy, Marketing,
          D&A, Admin & General, Finance Costs, Tax.
        tests:
          - not_null
      - name: financial_statement
        description: >
          Financial statement this account belongs to.
          IS = Income Statement (4xxx–8xxx accounts),
          BS = Balance Sheet (1xxx–3xxx accounts).
          Note: CF accounts are derived from bank transactions via
          fct_cash_flow, not from the chart_of_accounts seed directly.
        tests:
          - not_null
          - accepted_values:
              values: ["IS", "BS"]
      - name: sign_convention
        description: >
          Multiplier for P&L sign normalisation. Revenue = 1 (credit-normal);
          COGS, OpEx, Finance Cost = -1 (debit-normal). Applied in
          rpt_pnl_summary to ensure all line items net correctly.
        tests:
          - not_null
          - accepted_values:
              values: [1, -1]
      - name: normal_balance
        description: >
          Accounting normal balance side for this account type.
          'Debit' for expense/asset accounts (COGS, OpEx, Finance Cost,
          Tax, Asset); 'Credit' for revenue/liability/equity accounts.
          Used in data quality tests to verify GL entries post to the
          correct side — e.g. a credit to COGS should trigger a warning.
        tests:
          - not_null
          - accepted_values:
              values: ["Debit", "Credit"]
      - name: sort_order
        description: >
          Integer display order for correct IS waterfall sequencing in
          rpt_pnl_summary and BI tools. Revenue accounts (4xxx) = 100–130,
          COGS (5xxx) = 200–220, OpEx (6xxx) = 300–360,
          Finance Cost (7xxx) = 400–410, Tax (8xxx) = 500.
          BS accounts (1xxx–3xxx) = 10–90. ORDER BY sort_order in
          reporting models guarantees Revenue → COGS → Gross Profit →
          OpEx → EBITDA → Finance → Tax → Net Income sequence.
        tests:
          - not_null
      - name: is_active
        description: >
          Boolean flag. TRUE = account is live and available for posting;
          FALSE = deactivated account retained for historical reference.
          dim_account filters WHERE is_active = TRUE so inactive accounts
          never appear in fact table joins or variance reports.
        tests:
          - not_null

  - name: dim_cost_center
    description: >
      Cost center dimension sourced from the cost_center_hierarchy seed.
      Provides the 3-level hierarchy: cost_center_code → department →
      division → subsidiary_code. Used in rpt_variance_analysis to drill
      down from subsidiary to department level.
    columns:
      - name: cost_center_key
        description: >
          Surrogate key generated by dbt_utils.generate_surrogate_key
          on cost_center_code. FK in fct_gl_actuals, fct_budget, fct_forecast.
        tests:
          - unique
          - not_null
      - name: cost_center_code
        description: Natural cost center code, e.g. "CC-RETAIL-MNL". Business key.
        tests:
          - unique
          - not_null
      - name: department
        description: Department name, e.g. "Retail Operations", "Logistics".
        tests:
          - not_null
      - name: division
        description: Division grouping above department level.
        tests:
          - not_null
      - name: subsidiary_code
        description: >
          Subsidiary this cost center rolls up to. Links to dim_subsidiary
          via subsidiary_code for subsidiary-level reporting.
        tests:
          - not_null
      - name: is_shared_service
        description: >
          Boolean flag. TRUE only for 'CC-SHARED-SVC'. Used in shared
          service charge-out reporting to identify cross-subsidiary cost
          allocations. Derived in dim_cost_center.sql from cost_center_code.
        tests:
          - not_null
      - name: is_active
        description: >
          Boolean flag inherited from cost_center_hierarchy seed.
          TRUE = cost center is live; FALSE = deactivated.
          All 10 simulated cost centers are active (TRUE) in this dataset.
        tests:
          - not_null

  - name: dim_subsidiary
    description: >
      Legal entity / subsidiary dimension sourced from cost_center_hierarchy
      seed. Each subsidiary has its own bank accounts, cost centers, and
      P&L reporting. reporting_currency is always PHP in this dataset.
    columns:
      - name: subsidiary_key
        description: >
          Surrogate key generated by dbt_utils.generate_surrogate_key
          on subsidiary_code. FK in all four fact tables.
        tests:
          - unique
          - not_null
      - name: subsidiary_code
        description: Natural subsidiary code, e.g. "SUB_A". Business key.
        tests:
          - unique
          - not_null
      - name: subsidiary_name
        description: Full legal name of the subsidiary entity.
        tests:
          - not_null
      - name: industry
        description: Industry classification of the subsidiary.
        tests:
          - not_null
      - name: reporting_currency
        description: Functional reporting currency. Always PHP in this dataset.
        tests:
          - not_null
          - accepted_values:
              values: ["PHP"]
      - name: is_group_entity
        description: >
          Boolean flag. TRUE only for subsidiary_code = 'GROUP' (the
          LandBank tax payment account entity). Useful to exclude the
          group-level entity from subsidiary P&L comparisons that should
          show only operating subsidiaries.
        tests:
          - not_null
      - name: is_active
        description: >
          Boolean flag inherited from cost_center_hierarchy seed (deduped
          per subsidiary). TRUE = subsidiary is live. All five subsidiaries
          (SUB_A through SUB_E) are active in this dataset.
        tests:
          - not_null

  - name: dim_scenario
    description: >
      Scenario dimension that enables analysts to compare Actual, Budget,
      and Revised Forecast versions in a single query without UNION
      statements. Derived dynamically from DISTINCT values across
      stg_gl_actuals, stg_budget, and stg_forecast — so new forecast
      versions (RF4, etc.) appear automatically on next dbt run.
      scenario_order controls display sort in dashboards.
    columns:
      - name: scenario_key
        description: >
          Surrogate key generated on (scenario_type, version). FK in all
          four fact tables. The key reason fct_gl_actuals, fct_budget,
          and fct_forecast can be joined without UNION in variance reports.
        tests:
          - unique
          - not_null
      - name: scenario_type
        description: >
          High-level scenario classification. Actual = ERP postings + Excel
          adjustments; Budget = CFO-approved annual plan; Revised Forecast =
          quarterly FP&A reforecast.
        tests:
          - not_null
          - accepted_values:
              values: ["Actual", "Budget", "Revised Forecast"]
      - name: version
        description: >
          Version identifier within a scenario_type. 'ACTUAL' for actuals;
          'v1.0' for budget; 'RF1'/'RF2'/'RF3' for revised forecasts.
        tests:
          - not_null
      - name: scenario_order
        description: >
          Integer sort order for dashboard display.
          1 = Actual, 2 = Budget, 3 = Forecast, 4 = Revised Forecast.
        tests:
          - not_null
      - name: created_date
        description: >
          Earliest _loaded_at date for this scenario/version combination.
          Derived from MIN(_loaded_at) in the source CTE.

  # ─────────────────────────────────────────────────────────────────────────────
  # FACT TABLES
  # ─────────────────────────────────────────────────────────────────────────────

  - name: fct_gl_actuals
    description: >
      Grain: 1 row per GL journal line. Materialized as incremental on
      journal_id, watermarked by _loaded_at. Combines ERP entries and
      Excel manual adjustments (unified in stg_gl_actuals). FX conversion
      to PHP applied via fx_rates seed. The primary fact table for actual
      vs budget variance analysis.
    columns:
      - name: journal_id
        description: >
          Unique GL line identifier. UUID for ERP entries; adjustment_id
          for Excel uploads. Natural unique key for incremental deduplication.
        tests:
          - unique
          - not_null
      - name: date_key
        description: FK to dim_date. Joins on posting_date.
        tests:
          - not_null
      - name: fiscal_year
        description: Fiscal year inherited from dim_date join.
        tests:
          - not_null
      - name: fiscal_month
        description: Fiscal month inherited from dim_date join.
        tests:
          - not_null
      - name: account_key
        description: FK to dim_account. Joins on gl_account_code.
        tests:
          - not_null
      - name: cost_center_key
        description: FK to dim_cost_center. Joins on cost_center_code.
        tests:
          - not_null
      - name: subsidiary_key
        description: FK to dim_subsidiary. Joins on subsidiary_code.
        tests:
          - not_null
      - name: scenario_key
        description: FK to dim_scenario. Always 'Actual' scenario for this fact.
        tests:
          - not_null
      - name: debit_amount
        description: Raw debit side of the GL entry in source currency.
        tests:
          - not_null
      - name: credit_amount
        description: Raw credit side of the GL entry in source currency.
        tests:
          - not_null
      - name: net_amount
        description: Signed net amount in source currency (debit - credit).
        tests:
          - not_null
      - name: net_amount_php
        description: >
          Net amount converted to PHP via fx_rates seed. For PHP entries
          (exchange_rate = 1.0), equals net_amount. Used as the primary
          measure in all reporting models.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -100000000
              max_value: 100000000
      - name: entry_source
        description: Origin of the GL line — 'ERP' or 'EXCEL_UPLOAD'.
        tests:
          - not_null
          - accepted_values:
              values: ["ERP", "EXCEL_UPLOAD"]
      - name: _loaded_at
        description: >
          Bronze load timestamp. Used as the incremental watermark —
          only rows with _loaded_at > MAX(_loaded_at) in the existing
          table are appended on each pipeline run.
        tests:
          - not_null

  - name: fct_budget
    description: >
      Grain: 1 row per GL account × cost center × subsidiary × fiscal month
      × budget version. Materialized as a full-refresh table (not incremental)
      because budget data is static — loaded once per year per version.
      Surrogate budget_key generated on the 6-column natural key.
    columns:
      - name: budget_key
        description: >
          Surrogate key generated by dbt_utils.generate_surrogate_key on
          (fiscal_year, fiscal_month, gl_account, cost_center, subsidiary,
          version). Unique row identifier.
        tests:
          - unique
          - not_null
      - name: fiscal_year
        description: Budget fiscal year (2024 or 2025).
        tests:
          - not_null
      - name: fiscal_month
        description: Budget month integer 1–12.
        tests:
          - not_null
      - name: account_key
        description: FK to dim_account.
        tests:
          - not_null
      - name: cost_center_key
        description: FK to dim_cost_center.
        tests:
          - not_null
      - name: subsidiary_key
        description: FK to dim_subsidiary.
        tests:
          - not_null
      - name: scenario_key
        description: FK to dim_scenario. Joins on scenario_type='Budget' and version.
        tests:
          - not_null
      - name: budget_amount_php
        description: Approved budget PHP amount for this account × CC × subsidiary × period.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 500000000
      - name: version
        description: Budget version string (e.g. "v1.0").
        tests:
          - not_null

  - name: fct_forecast
    description: >
      Grain: 1 row per GL account × cost center × subsidiary × fiscal month
      × forecast version (RF1/RF2/RF3). Materialized as a full-refresh table
      because all three RF versions are reloaded on every close cycle.
      Surrogate forecast_key generated on the same 6-column natural key as
      fct_budget for JOIN compatibility in rpt_variance_analysis.
    columns:
      - name: forecast_key
        description: >
          Surrogate key generated by dbt_utils.generate_surrogate_key on
          (fiscal_year, fiscal_month, gl_account, cost_center, subsidiary,
          version). Unique row identifier.
        tests:
          - unique
          - not_null
      - name: fiscal_year
        description: Forecast fiscal year (2024).
        tests:
          - not_null
      - name: fiscal_month
        description: Forecast month integer 1–12.
        tests:
          - not_null
      - name: account_key
        description: FK to dim_account.
        tests:
          - not_null
      - name: cost_center_key
        description: FK to dim_cost_center.
        tests:
          - not_null
      - name: subsidiary_key
        description: FK to dim_subsidiary.
        tests:
          - not_null
      - name: scenario_key
        description: FK to dim_scenario. Joins on scenario_type='Revised Forecast' and version.
        tests:
          - not_null
      - name: forecast_amount_php
        description: Forecasted PHP amount for this account × CC × subsidiary × period × version.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 500000000
      - name: version
        description: Forecast version — RF1, RF2, or RF3.
        tests:
          - not_null
          - accepted_values:
              values: ["RF1", "RF2", "RF3"]

  - name: fct_cash_flow
    description: >
      Grain: 1 row per bank transaction. Materialized as incremental on
      bank_ref, watermarked by _loaded_at. Covers 18 months of bank feed
      data across 6 subsidiary accounts. Inflow/outflow align with the
      indirect cash flow statement categories (Operating/Investing/Financing).
      The account_key join uses a CASE-based GL account mapping since bank
      transactions are not directly tagged to GL accounts.
    columns:
      - name: bank_ref
        description: >
          Unique bank transaction reference ID. Natural key from the bank
          feed; used as incremental unique key.
        tests:
          - unique
          - not_null
      - name: date_key
        description: FK to dim_date. Joins on txn_date.
        tests:
          - not_null
      - name: fiscal_year
        description: Fiscal year inherited from dim_date join.
        tests:
          - not_null
      - name: fiscal_month
        description: Fiscal month inherited from dim_date join.
        tests:
          - not_null
      - name: subsidiary_key
        description: FK to dim_subsidiary. Joins on subsidiary_code.
        tests:
          - not_null
      - name: account_key
        description: >
          FK to dim_account. Mapped via CASE on cf_category:
          Operating → 4001, Investing → 6004, Financing → 7001.
          This is a simplification — in production this would join
          to a bank-to-GL mapping table.
        tests:
          - not_null
      - name: outflow_php
        description: PHP amount debited from the bank account (cash out).
        tests:
          - not_null
      - name: inflow_php
        description: PHP amount credited to the bank account (cash in).
        tests:
          - not_null
      - name: net_cash_php
        description: Signed net PHP cash movement. Positive = inflow, negative = outflow.
        tests:
          - not_null
      - name: cf_category
        description: Cash flow statement classification — Operating, Investing, or Financing.
        tests:
          - not_null
          - accepted_values:
              values: ["Operating", "Investing", "Financing"]
      - name: _loaded_at
        description: >
          Bronze load timestamp. Used as the incremental watermark —
          only rows with _loaded_at > MAX(_loaded_at) in the existing
          table are appended on each pipeline run.
        tests:
          - not_null
