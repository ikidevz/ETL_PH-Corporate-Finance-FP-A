version: 2

models:
  - name: dim_date
    description: "Date spine with PH fiscal calendar mapping and period lock status."
    columns:
      - name: date_key
        tests: [unique, not_null]
      - name: fiscal_year
        tests: [not_null]
      - name: fiscal_month
        tests: [not_null]
      - name: period_status
        tests:
          - accepted_values:
              values: ["OPEN", "CLOSED"]

  - name: dim_account
    description: "GL accounts sourced from chart_of_accounts seed. Includes IS and BS accounts. P&L fact tables join on IS accounts only (filtered by financial_statement='IS')."
    columns:
      - name: account_key
        tests: [unique, not_null]
      - name: gl_account_code
        tests: [unique, not_null]
      - name: account_type
        tests:
          - accepted_values:
              values:
                [
                  "Revenue",
                  "COGS",
                  "OpEx",
                  "Finance Cost",
                  "Tax",
                  "Asset",
                  "Liability",
                  "Equity",
                ]
      - name: financial_statement
        tests:
          - accepted_values:
              values: ["IS", "BS"]
      - name: normal_balance
        tests:
          - accepted_values:
              values: ["Debit", "Credit"]
      - name: sort_order
        tests: [not_null]
      - name: is_active
        tests: [not_null]
      - name: sign_convention
        description: >
          -1 for Revenue (GL stores it credit-normal / negative), 1 for all
          other account types (already debit-normal / positive). Applied to
          net_amount_php in fct_gl_actuals so every account type surfaces as
          a positive magnitude in reporting, matching how rpt_pnl_summary and
          rpt_executive_dashboard subtract costs from revenue explicitly.
        tests:
          - accepted_values:
              values: [-1, 1]

  - name: dim_cost_center
    description: "Cost centers with department and division hierarchy."
    columns:
      - name: cost_center_key
        tests: [unique, not_null]
      - name: cost_center_code
        tests: [unique, not_null]

  - name: dim_subsidiary
    description: "Legal entities / subsidiaries with reporting currency."
    columns:
      - name: subsidiary_key
        tests: [unique, not_null]
      - name: subsidiary_code
        tests: [unique, not_null]

  - name: dim_scenario
    description: "Scenario dimension — Actual, Budget, Revised Forecast versions."
    columns:
      - name: scenario_key
        tests: [unique, not_null]
      - name: scenario_type
        tests:
          - accepted_values:
              values: ["Actual", "Budget", "Revised Forecast"]

  - name: dim_employee
    description: "Grain: 1 row per employee. Sourced from HRIS roster."
    columns:
      - name: employee_key
        tests: [unique, not_null]
      - name: employee_id
        tests: [unique, not_null]
      - name: employment_status
        tests:
          - accepted_values:
              values: ["ACTIVE", "TERMINATED"]

  - name: fct_gl_actuals
    description: "Grain: 1 row per GL journal line. Incremental on _loaded_at."
    columns:
      - name: journal_id
        tests: [unique, not_null]
      - name: net_amount_php
        description: >
          net_amount converted to PHP and multiplied by dim_account.sign_convention,
          so Revenue, COGS, OpEx, Finance Cost, and Tax all surface as positive
          magnitudes regardless of GL debit/credit-normal storage.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: -100000000
              max_value: 100000000

  - name: fct_budget
    description: "Grain: 1 row per account × cost center × subsidiary × month × version."
    columns:
      - name: budget_key
        tests: [unique, not_null]
      - name: budget_amount_php
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 500000000

  - name: fct_forecast
    description: "Grain: 1 row per account × cost center × subsidiary × month × RF version."
    columns:
      - name: forecast_key
        tests: [unique, not_null]
      - name: forecast_amount_php
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 500000000

  - name: fct_cash_flow
    description: "Grain: 1 row per bank transaction. Incremental on _loaded_at."
    columns:
      - name: bank_ref
        tests: [unique, not_null]
      - name: net_cash_php
        tests: [not_null]
      - name: cf_category
        tests:
          - accepted_values:
              values: ["Operating", "Investing", "Financing"]

  - name: fct_ap_ar
    description: "Grain: 1 row per AP/AR invoice. Full refresh — status can change after load."
    columns:
      - name: ap_ar_key
        tests: [unique, not_null]
      - name: invoice_id
        tests: [unique, not_null]
      - name: doc_type
        tests:
          - accepted_values:
              values: ["AP", "AR"]
      - name: status
        tests:
          - accepted_values:
              values: ["OPEN", "PAID", "OVERDUE"]

  - name: fct_intercompany
    description: "Grain: 1 row per intercompany posting. Incremental on _loaded_at."
    columns:
      - name: intercompany_id
        tests: [unique, not_null]
      - name: amount_php
        tests: [not_null]
      - name: ic_type
        tests:
          - accepted_values:
              values: ["SHARED_SERVICE_CHARGE", "INTERCOMPANY_LOAN", "MGMT_FEE"]
